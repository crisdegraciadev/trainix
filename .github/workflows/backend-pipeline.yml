name: Backend Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-22.04

    steps:
      - uses: ./.github/actions/setup-api.yml

      - name: Lint
        run: pnpm run api:lint

  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: ./.github/actions/setup-api.yml

      - name: Build
        run: pnpm run api:build

  test-unit:
    runs-on: ubuntu-22.04

    steps:
      - uses: ./.github/actions/setup-api.yml

      - name: Test unit
        run: pnpm run api:test:u

  test-e2e:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15.3
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: trainix
          POSTGRES_PASSWORD: trainix
          POSTGRES_DB: trainix
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: ./.github/actions/setup-api.yml

      - name: Test e2e
        run: pnpm run api:test:e2e
