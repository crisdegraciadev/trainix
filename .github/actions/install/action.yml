name: "Build"
description: "Sets up the repository"
runs:
  using: "composite"
  steps:
    - name: "Install pnpm"
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Install node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install
