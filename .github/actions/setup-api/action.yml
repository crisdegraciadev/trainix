name: "Setup API"
description: "Fetch the Repo, Install node & Install pnpm"
runs:
  using: "composite"
  steps:
      - name: Fetch API package
        uses: actions/checkout@v4
        with:
          sparse-checkout: api

      - name: "Install pnpm"
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "pnpm"